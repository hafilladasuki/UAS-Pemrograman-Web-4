<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Report - Layanan Pengaduan Masyarakat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div id="app" class="max-w-4xl mx-auto p-4 sm:p-6" v-cloak>
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-lg text-white"><i class="fas fa-bullhorn text-xl"></i></div>
                <div>
                    <h1 class="text-xl font-bold text-white">Suara Masyarakat</h1>
                    <p class="text-xs text-slate-400">Sistem Informasi Pengaduan Publik</p>
                </div>
            </div>
            <a href="admin.html" class="bg-slate-700 hover:bg-slate-600 text-slate-200 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2">
                <i class="fas fa-user-shield"></i> Portal Admin
            </a>
        </header>

        <!-- Form Pengaduan Baru -->
        <section class="bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-xl mb-8">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><i class="fas fa-pen-alt text-indigo-400"></i> Tulis Laporan Anda</h2>
            <form @submit.prevent="kirimAduan" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Pilih Kategori</label>
                    <select v-model="form.kategori" class="w-full px-4 py-2.5 rounded-lg bg-slate-700 border border-slate-600 text-white focus:outline-none focus:border-indigo-500">
                        <option value="Infrastruktur">Infrastruktur (Jalan, Jembatan, Rusak)</option>
                        <option value="Fasilitas Publik">Fasilitas Publik (Lampu Jalan, Halte)</option>
                        <option value="Pelayanan">Pelayanan Administrasi</option>
                        <option value="Umum">Laporan Umum</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Isi Laporan / Keluhan</label>
                    <textarea v-model="form.isi_laporan" rows="4" required placeholder="Ketik rincian pengaduan Anda di sini secara jelas..." class="w-full px-4 py-2.5 rounded-lg bg-slate-700 border border-slate-600 text-white focus:outline-none focus:border-indigo-500"></textarea>
                </div>
                <button type="submit" :disabled="loading" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition disabled:opacity-50 flex items-center justify-center gap-2">
                    <span v-if="loading"><i class="fas fa-spinner fa-spin"></i> Mengirim Laporan...</span>
                    <span v-else><i class="fas fa-paper-plane"></i> Kirim Pengaduan Sekarang</span>
                </button>
            </form>
        </section>

        <!-- Alur Monitoring Laporan dari phpMyAdmin -->
        <section class="bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-white flex items-center gap-2"><i class="fas fa-stream text-indigo-400"></i> Laporan Terkini Terdaftar</h2>
                <span class="text-xs text-slate-400 bg-slate-700 px-2.5 py-1 rounded-full"><i class="fas fa-database text-emerald-400 mr-1"></i> Live Database</span>
            </div>
            
            <div class="space-y-4 max-h-96 overflow-y-auto pr-1">
                <div v-if="listAduan.length === 0" class="text-center py-8 text-slate-500">
                    Belum ada laporan masuk di database phpMyAdmin.
                </div>
                <div v-for="item in listAduan" :key="item.id" class="p-4 bg-slate-700/40 rounded-xl border border-slate-700">
    <div class="flex justify-between items-start gap-2 mb-2">
        <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2.5 py-0.5 rounded-full text-xs font-semibold">
            {{ item.nama_kategori }}
        </span>
        <span class="text-xs text-slate-500 font-mono">ID: #{{ item.id }}</span>
    </div>
    <p class="text-sm text-slate-300 leading-relaxed">{{ item.deskripsi }}</p>
</div>
            </div>
        </section>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    loading: false,
                    form: { kategori: 'Infrastruktur', isi_laporan: '' },
                    listAduan: [],
                    apiUrl: 'http://localhost:8080/api/pengaduan'
                }
            },
            mounted() {
                this.ambilDataDatabase();
            },
            methods: {
                async ambilDataDatabase() {
                    try {
                        const response = await axios.get(this.apiUrl);
                        this.listAduan = Array.isArray(response.data) ? response.data : (response.data.data || []);
                    } catch (error) {
                        console.error("Gagal konek phpMyAdmin:", error);
                    }
                },
                async kirimAduan() {
                    this.loading = true;
                    try {
                        const response = await axios.post(`${this.apiUrl}/create`, this.form);
                        if (response.data.success) {
                            alert("Sukses! Laporan Anda langsung masuk ke phpMyAdmin XAMPP! 🔥");
                            this.form.isi_laporan = '';
                            this.ambilDataDatabase(); // Refresh data biar langsung muncul bawahnya
                        }
                    } catch (error) {
                        alert("Gagal mengirim aduan, periksa kembali koneksi backend.");
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
